<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קופידון – האם אתם מגיעים?</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&family=Frank+Ruhl+Libre:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#faf5f4; --card:#ffffff; --ink:#3a1512; --muted:#9a8a88;
    --primary:#a6201e; --primary-dark:#851512;
    --green:#1f9d55; --green-bg:#e6f6ec; --green-border:#bfe8cf;
    --red:#e5484d; --red-bg:#fdeeee; --red-border:#f6c6c8;
    --gold:#b08d4f;
    --shadow:0 10px 30px rgba(140,30,25,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Heebo',sans-serif;background:var(--bg);color:var(--ink);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .phone-card{
    width:100%;max-width:420px;background:var(--card);border-radius:22px;
    box-shadow:var(--shadow);overflow:hidden;
  }
  .invite-img{width:100%;height:auto;display:block;background:#efece2}
  .content{padding:30px 24px 34px;text-align:center}
  .brand-logo{width:66px;height:66px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 14px;
    box-shadow:0 4px 14px rgba(140,30,25,.25)}
  .greet{font-size:17px;line-height:1.55;color:var(--ink)}
  .couple{
    font-family:'Frank Ruhl Libre',serif;font-weight:700;color:var(--gold);
    font-size:30px;margin:6px 0 2px;letter-spacing:.5px;
  }
  .heart{color:var(--gold);font-size:13px;opacity:.7}
  .event-date{color:var(--muted);font-size:14px;margin-top:4px}
  .question{font-weight:700;font-size:19px;margin:26px 0 18px}
  .choices{display:flex;gap:12px;justify-content:center}
  .choice{
    flex:1;max-width:150px;padding:15px 0;border-radius:14px;font-family:inherit;
    font-size:18px;font-weight:700;cursor:pointer;transition:all .18s ease;
  }
  .choice:focus-visible{outline:3px solid var(--primary);outline-offset:2px}
  .choice:active{transform:scale(.97)}
  .choice.yes{background:var(--green-bg);border:2px solid var(--green-border);color:var(--green)}
  .choice.yes:hover{background:var(--green);border-color:var(--green);color:#fff}
  .choice.no{background:var(--red-bg);border:2px solid var(--red-border);color:var(--red)}
  .choice.no:hover{background:var(--red);border-color:var(--red);color:#fff}
  .err{color:var(--red);font-size:14px;margin-top:14px;display:none}

  .screen{display:none;padding:70px 30px;text-align:center;min-height:420px;
    flex-direction:column;align-items:center;justify-content:center}
  .screen.show{display:flex}
  .spinner{width:56px;height:56px;position:relative;margin-bottom:26px}
  .spinner span{
    position:absolute;top:0;right:50%;width:10px;height:10px;border-radius:50%;
    background:var(--primary);transform-origin:5px 28px;animation:fade 1s linear infinite;
  }
  @keyframes fade{0%{opacity:1}100%{opacity:.15}}
  .loading-text{font-size:18px;font-weight:600;color:var(--ink);line-height:1.7}
  .result-icon{
    width:74px;height:74px;border-radius:50%;border:3px solid var(--green);
    display:flex;align-items:center;justify-content:center;margin-bottom:20px;
    animation:pop .4s ease;
  }
  @keyframes pop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
  .result-icon svg{width:36px;height:36px;stroke:var(--green);stroke-width:3;fill:none}
  .result-icon.sad{border-color:var(--muted)}
  .result-icon.sad span{font-size:34px}
  .thanks{font-size:30px;font-weight:800;color:var(--ink);margin-bottom:8px}
  .thanks-sub{font-size:16px;color:var(--muted);line-height:1.7}
  .table-card{
    margin-top:24px;background:var(--green-bg);border:2px solid var(--green-border);
    border-radius:16px;padding:18px 34px;
  }
  .table-card .label{font-size:14px;color:var(--green);font-weight:600}
  .table-card .tname{font-size:28px;font-weight:800;color:var(--ink);margin-top:4px}
  .divider{display:flex;align-items:center;gap:10px;color:var(--primary);margin-top:26px;opacity:.6}
  .divider::before,.divider::after{content:"";width:46px;height:1px;background:var(--primary)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<main class="phone-card">

  <!-- ===== מסך טעינה ראשוני ===== -->
  <section class="screen show" id="initLoading">
    <div class="spinner" id="initSpinner"></div>
    <p class="loading-text">רק רגע...</p>
  </section>

  <!-- ===== מסך השאלה ===== -->
  <section id="askScreen" style="display:none">
    <div class="content">
      <img src="logo.png" class="brand-logo" alt="קופידון">
      <p class="greet">שלום,<br>האירוע של</p>
      <div class="couple" id="coupleName">…</div>
      <div class="heart">♥</div>
      <div class="event-date" id="eventDate"></div>

      <p class="question">האם אתם עדיין מגיעים?</p>
      <div class="choices">
        <button type="button" class="choice yes" id="btnYes">כן 🎉</button>
        <button type="button" class="choice no"  id="btnNo">לא</button>
      </div>
      <p class="err" id="errMsg"></p>
    </div>
    <img id="inviteImg" class="invite-img" src="" alt="הזמנה לאירוע" hidden>
  </section>

  <!-- ===== מסך שליחה ===== -->
  <section class="screen" id="loadingScreen">
    <div class="spinner" id="spinner"></div>
    <p class="loading-text">מעדכן...<br>נא להמתין</p>
  </section>

  <!-- ===== מסך "כן" – הצגת השולחן ===== -->
  <section class="screen" id="yesScreen">
    <div class="result-icon">
      <svg viewBox="0 0 24 24"><polyline points="4 12.5 10 18.5 20 6.5"/></svg>
    </div>
    <p class="thanks">נתראה באירוע!</p>
    <p class="thanks-sub" id="yesSub">שמחים שאתם מגיעים 💚</p>
    <div class="table-card" id="tableCard" style="display:none">
      <div class="label">השולחן שלכם</div>
      <div class="tname" id="tableName"></div>
    </div>
    <p class="thanks-sub" id="noTableMsg" style="display:none;margin-top:20px">
      טרם שובצתם לשולחן –<br>פנו למארחים בכניסה לאירוע.
    </p>
    <div class="divider">♥</div>
  </section>

  <!-- ===== מסך "לא" ===== -->
  <section class="screen" id="noScreen">
    <div class="result-icon sad"><span>💔</span></div>
    <p class="thanks">תודה על העדכון</p>
    <p class="thanks-sub">חבל שלא ניפגש –<br>המערכת עודכנה בהתאם.</p>
    <div class="divider">♥</div>
  </section>

</main>

<script>
/* ================================================================
   הגדרות
================================================================ */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby9u-P8dQa29K4V2t3x4RK-F3uBLXHqI2qhrEQ56I_R2o_QdQ5DOK99VonvyeAu_tPAMg/exec";

/* קישור: confirm.html?event=EVENT_ID&p=0541234567 (זיהוי לפי 8 ספרות אחרונות) */
const params  = new URLSearchParams(location.search);
const eventId = params.get("event") || "default";
const rawId   = params.get("p") || params.get("phone") || "";
const guestKey = rawId.replace(/\D/g,"").slice(-8);

/* ---------- ספינרים ---------- */
function buildSpinner(el){
  for(let i=0;i<10;i++){
    const dot=document.createElement("span");
    dot.style.transform=`rotate(${i*36}deg) translateY(-1px)`;
    dot.style.animationDelay=(i*0.1)+"s";
    el.appendChild(dot);
  }
}
buildSpinner(document.getElementById("spinner"));
buildSpinner(document.getElementById("initSpinner"));

/* ---------- חשיפת השאלה אחרי טעינת פרטי האירוע ---------- */
let shown=false;
function showAsk(){
  if(shown) return;
  shown=true;
  document.getElementById("initLoading").classList.remove("show");
  document.getElementById("askScreen").style.display="";
}
setTimeout(showAsk, 8000);

fetch(`${SCRIPT_URL}?action=eventInfo&event=${encodeURIComponent(eventId)}`)
  .then(r=>r.json())
  .then(d=>{
    if(!d.ok){ document.getElementById("coupleName").textContent="האירוע"; showAsk(); return; }
    document.getElementById("coupleName").textContent = d.event.name || "";
    document.getElementById("eventDate").textContent  = d.event.date || "";
    document.title = "האם אתם מגיעים? – " + (d.event.name||"");
    if(d.event.image){
      const img=document.getElementById("inviteImg");
      img.onload = ()=>{ img.hidden=false; showAsk(); };
      img.onerror = showAsk;
      img.src=d.event.image;
    }else{
      showAsk();
    }
  })
  .catch(()=>{ document.getElementById("coupleName").textContent="האירוע"; showAsk(); });

/* ---------- שליחת התשובה ---------- */
const errMsg=document.getElementById("errMsg");
async function answer(coming){
  document.getElementById("askScreen").style.display="none";
  errMsg.style.display="none";
  document.getElementById("loadingScreen").classList.add("show");

  try{
    const res=await fetch(SCRIPT_URL,{
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({
        action:"confirmArrival",
        event:eventId,
        key:guestKey,
        link:location.href,
        coming:coming
      })
    });
    const d=await res.json();
    if(!d.ok) throw new Error(d.error||"שגיאה");
    document.getElementById("loadingScreen").classList.remove("show");

    if(coming){
      if(d.table){
        document.getElementById("tableName").textContent=d.table;
        document.getElementById("tableCard").style.display="";
      }else{
        document.getElementById("noTableMsg").style.display="";
      }
      document.getElementById("yesScreen").classList.add("show");
    }else{
      document.getElementById("noScreen").classList.add("show");
    }
  }catch(e){
    document.getElementById("loadingScreen").classList.remove("show");
    document.getElementById("askScreen").style.display="";
    errMsg.textContent="העדכון נכשל, נסו שוב בעוד רגע";
    errMsg.style.display="block";
  }
}
document.getElementById("btnYes").onclick=()=>answer(true);
document.getElementById("btnNo").onclick =()=>answer(false);
</script>
</body>
</html>
