<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פנקס אנשי קשר</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;900&family=Frank+Ruhl+Libre:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c2733;
    --ink-soft: #5b6b7c;
    --paper: #f7f9fb;
    --card: #ffffff;
    --line: #dde5ec;
    --accent: #0f766e;      /* ירוק-כחלחל עמוק */
    --accent-soft: #e6f2f1;
    --danger: #b4453c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Heebo', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding: 48px 20px 80px;
  }

  .wrap { max-width: 640px; margin: 0 auto; }

  header { margin-bottom: 36px; }

  .eyebrow {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Frank Ruhl Libre', 'Heebo', serif;
    font-size: clamp(32px, 6vw, 44px);
    font-weight: 900;
    line-height: 1.1;
  }

  .subtitle {
    margin-top: 10px;
    color: var(--ink-soft);
    font-size: 15px;
  }

  /* ---- טופס הוספה ---- */
  .add-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 12px;
    box-shadow: 0 1px 3px rgba(28,39,51,0.05);
    margin-bottom: 40px;
  }

  .field { display: flex; flex-direction: column; gap: 6px; }

  label {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
  }

  input {
    font-family: inherit;
    font-size: 16px;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--paper);
    color: var(--ink);
    transition: border-color 0.15s, box-shadow 0.15s;
    min-width: 0;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  input.invalid { border-color: var(--danger); }

  #phone { direction: ltr; text-align: right; }

  .btn-add {
    align-self: end;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    padding: 10px 22px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .btn-add:hover { background: #0d5f58; }
  .btn-add:active { transform: scale(0.97); }
  .btn-add:focus-visible { outline: 3px solid var(--accent-soft); outline-offset: 2px; }

  .error-msg {
    grid-column: 1 / -1;
    color: var(--danger);
    font-size: 13px;
    display: none;
  }
  .error-msg.show { display: block; }

  /* ---- הטבלה ---- */
  .table-head-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  h2 {
    font-family: 'Frank Ruhl Libre', 'Heebo', serif;
    font-size: 22px;
    font-weight: 700;
  }

  .count {
    font-size: 13px;
    color: var(--ink-soft);
    background: var(--accent-soft);
    color: var(--accent);
    font-weight: 700;
    padding: 3px 12px;
    border-radius: 99px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(28,39,51,0.05);
  }

  thead th {
    text-align: right;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--ink-soft);
    background: var(--paper);
    padding: 12px 18px;
    border-bottom: 2px solid var(--line);
  }

  tbody td {
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    font-size: 16px;
  }

  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.12s; }
  tbody tr:hover { background: #fbfdfe; }

  td.name { font-weight: 500; }

  td.phone {
    direction: ltr;
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--ink-soft);
    letter-spacing: 0.03em;
  }

  td.actions { width: 44px; padding: 0 10px; text-align: center; }

  .btn-del {
    border: none;
    background: transparent;
    color: #b9c4cf;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 8px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  .btn-del:hover { color: var(--danger); background: #faf0ef; }
  .btn-del:focus-visible { outline: 2px solid var(--danger); }

  /* ---- מצב ריק ---- */
  .empty {
    text-align: center;
    padding: 56px 20px;
    color: var(--ink-soft);
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: 14px;
  }
  .empty .big { font-size: 34px; margin-bottom: 10px; }
  .empty p { font-size: 15px; }

  @media (max-width: 560px) {
    .add-card { grid-template-columns: 1fr; }
    .btn-add { align-self: stretch; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">פנקס אישי</div>
    <h1>אנשי הקשר שלי</h1>
    <p class="subtitle">הוסיפו שם ומספר טלפון, והרשימה תתעדכן בטבלה למטה.</p>
  </header>

  <div class="add-card">
    <div class="field">
      <label for="name">שם</label>
      <input type="text" id="name" placeholder="למשל: דנה לוי" autocomplete="off">
    </div>
    <div class="field">
      <label for="phone">טלפון</label>
      <input type="tel" id="phone" placeholder="050-1234567" autocomplete="off">
    </div>
    <button class="btn-add" id="addBtn">הוספה</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="table-head-row">
    <h2>הטבלה</h2>
    <span class="count" id="count">0 אנשי קשר</span>
  </div>

  <div id="tableArea"></div>

</div>

<script>
  let contacts = [];

  const nameInput = document.getElementById('name');
  const phoneInput = document.getElementById('phone');
  const addBtn = document.getElementById('addBtn');
  const errorMsg = document.getElementById('errorMsg');
  const tableArea = document.getElementById('tableArea');
  const countEl = document.getElementById('count');

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
  }

  function clearError() {
    errorMsg.classList.remove('show');
    nameInput.classList.remove('invalid');
    phoneInput.classList.remove('invalid');
  }

  function addContact() {
    clearError();
    const name = nameInput.value.trim();
    const phone = phoneInput.value.trim();

    if (!name) {
      nameInput.classList.add('invalid');
      showError('צריך למלא שם.');
      nameInput.focus();
      return;
    }
    if (!phone) {
      phoneInput.classList.add('invalid');
      showError('צריך למלא מספר טלפון.');
      phoneInput.focus();
      return;
    }
    if (!/^[\d\s\-+()]{5,20}$/.test(phone)) {
      phoneInput.classList.add('invalid');
      showError('מספר הטלפון יכול להכיל רק ספרות, רווחים, מקפים וסוגריים.');
      phoneInput.focus();
      return;
    }

    contacts.push({ id: Date.now(), name, phone });
    nameInput.value = '';
    phoneInput.value = '';
    nameInput.focus();
    render();
  }

  function removeContact(id) {
    contacts = contacts.filter(c => c.id !== id);
    render();
  }

  function render() {
    countEl.textContent = contacts.length === 1
      ? 'איש קשר אחד'
      : contacts.length + ' אנשי קשר';

    if (contacts.length === 0) {
      tableArea.innerHTML =
        '<div class="empty"><div class="big">📇</div><p>הרשימה ריקה עדיין. הוסיפו את איש הקשר הראשון למעלה.</p></div>';
      return;
    }

    const table = document.createElement('table');
    table.innerHTML =
      '<thead><tr><th>שם</th><th>טלפון</th><th></th></tr></thead>';
    const tbody = document.createElement('tbody');

    contacts.forEach(c => {
      const tr = document.createElement('tr');

      const tdName = document.createElement('td');
      tdName.className = 'name';
      tdName.textContent = c.name;

      const tdPhone = document.createElement('td');
      tdPhone.className = 'phone';
      tdPhone.textContent = c.phone;

      const tdActions = document.createElement('td');
      tdActions.className = 'actions';
      const del = document.createElement('button');
      del.className = 'btn-del';
      del.textContent = '✕';
      del.setAttribute('aria-label', 'מחיקת ' + c.name);
      del.addEventListener('click', () => removeContact(c.id));
      tdActions.appendChild(del);

      tr.appendChild(tdName);
      tr.appendChild(tdPhone);
      tr.appendChild(tdActions);
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    tableArea.innerHTML = '';
    tableArea.appendChild(table);
  }

  addBtn.addEventListener('click', addContact);
  [nameInput, phoneInput].forEach(el =>
    el.addEventListener('keydown', e => { if (e.key === 'Enter') addContact(); })
  );

  render();
</script>
</body>
</html>
